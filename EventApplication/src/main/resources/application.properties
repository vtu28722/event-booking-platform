server.port=8081

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/event_app_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=hanimi@7670

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Static resources mapping (optional, but good for explicit configuration)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Fix date serialization
spring.jackson.serialization.write-dates-as-timestamps=false
