<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket - Event Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">EventApp</a></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary-color);">Secure Your Spot</h2>
            <div id="eventDetails"
                style="margin-bottom: 2rem; padding: 1.5rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; text-align: center;">
                <h3 id="e-title" style="margin-bottom: 0.5rem;">Loading event...</h3>
                <p id="e-info" style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.5rem;"></p>
                <div style="display: inline-block; padding: 0.25rem 1rem; background: var(--primary-light); color: var(--primary-color); border-radius: 9999px; font-weight: 700;"
                    id="e-price"></div>
            </div>

            <form id="bookForm">
                <input type="hidden" id="eventIdInput" name="eventId">
                <div class="form-group">
                    <label>Number of Tickets</label>
                    <input type="number" id="ticketCount" name="numberOfTickets" min="1" value="1"
                        style="font-size: 1.25rem; font-weight: 600; text-align: center;" required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod" name="paymentMethod"
                        style="width: 100%; padding: 0.8rem; font-size: 1rem; border: 1px solid var(--border-color); border-radius: 8px; margin-top: 5px;"
                        required>
                        <option value="Credit Card">Credit Card</option>
                        <option value="PayPal">PayPal</option>
                        <option value="UPI">UPI</option>
                    </select>
                </div>
                <div id="cardDetails"
                    style="margin-top: 1rem; padding: 1rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px;">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="1234 5678 9101 1121"
                            style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Expiry</label>
                            <input type="text" placeholder="MM/YY"
                                style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 8px;">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>CVV</label>
                            <input type="text" placeholder="123"
                                style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 8px;">
                        </div>
                    </div>
                </div>
                <div
                    style="font-size: 1.5rem; font-weight: 800; margin: 2rem 0 1rem; text-align: center; color: var(--text-primary); border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    Total: $<span id="calcTotal">0.00</span>
                </div>
                <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Confirm
                    Booking</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let eventPrice = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');

            if (!eventId) {
                showToast('No event selected', 'error');
                return;
            }

            document.getElementById('eventIdInput').value = eventId;

            try {
                const res = await fetch(`/api/events/${eventId}`);
                if (res.ok) {
                    const event = await res.json();
                    document.getElementById('e-title').innerText = event.title;
                    document.getElementById('e-info').innerText = `${event.date} @ ${event.venue}`;
                    document.getElementById('e-price').innerText = `Price: $${event.price.toFixed(2)}${event.availableSeats > 0 ? '' : ' (Sold Out)'}`;

                    eventPrice = event.price;
                    updateTotal();
                } else {
                    document.getElementById('e-title').innerText = 'Event not found.';
                }
            } catch (err) {
                document.getElementById('e-title').innerText = 'Error loading event.';
            }

            document.getElementById('ticketCount').addEventListener('input', updateTotal);

            handleFormSubmit('bookForm', '/bookings', '/my-bookings.html');
        });

        function updateTotal() {
            const count = parseInt(document.getElementById('ticketCount').value) || 0;
            const total = count * eventPrice;
            document.getElementById('calcTotal').innerText = total.toFixed(2);
        }

        document.getElementById('paymentMethod').addEventListener('change', (e) => {
            const cardDetails = document.getElementById('cardDetails');
            if (e.target.value === 'Credit Card') {
                cardDetails.style.display = 'block';
            } else {
                cardDetails.style.display = 'none';
            }
        });
    </script>
</body>

</html>
