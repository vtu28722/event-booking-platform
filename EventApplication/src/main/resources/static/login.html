<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">EventApp</a></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary-color);">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">Don't have an account? <a
                    href="/register.html" style="color: var(--primary-color); font-weight: 600;">Register instantly</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            handleFormSubmit('loginForm', '/auth/login', '/events.html');
        });
    </script>
</body>

</html>
