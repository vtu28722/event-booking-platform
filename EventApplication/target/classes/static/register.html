<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">EventApp</a></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary-color);">Create an Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select name="role">
                        <option value="ROLE_USER">Regular Access</option>
                        <option value="ROLE_ADMIN">Admin Access</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">Already have an account? <a
                    href="/login.html" style="color: var(--primary-color); font-weight: 600;">Log in</a></p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            handleFormSubmit('registerForm', '/auth/register', '/login.html');
        });
    </script>
</body>

</html>
