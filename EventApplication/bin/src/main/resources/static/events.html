<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - Event Platform</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .event-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">EventApp</a></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">Upcoming
            Events</h2>

        <div id="events-loader">Loading events...</div>
        <div class="events-grid" id="eventsList" style="display: none;">
            <!-- Rendered by JS -->
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Check auth first to determine if we show delete button (we'll just fetch user role if logged in)
                let isAdmin = false;
                const sessionRes = await fetch('/api/users/profile');
                if (sessionRes.ok) {
                    const user = await sessionRes.json();
                    isAdmin = user.role === 'ROLE_ADMIN';
                }

                const res = await fetch('/api/events');
                const events = await res.json();

                document.getElementById('events-loader').style.display = 'none';
                const container = document.getElementById('eventsList');
                container.style.display = 'grid';

                if (events.length === 0) {
                    container.innerHTML = '<p>No upcoming events found.</p>';
                    return;
                }

                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let actionsHtml = `<a href="/book-ticket.html?id=${event.id}" class="btn">Book Tickets</a>`;

                    if (isAdmin) {
                        actionsHtml += `<button onclick="deleteEvent(${event.id})" class="btn" style="background-color: var(--error-color);">Delete</button>`;
                    }

                    card.innerHTML = `
                        <div class="card-body">
                            <div class="card-title">${event.title}</div>
                            <div class="card-meta">
                                <span>📅 ${event.date}</span>
                                <span>📍 ${event.venue}</span>
                            </div>
                            <p class="card-text">${event.description}</p>
                            <p><strong>Price:</strong> $${event.price.toFixed(2)}</p>
                            <p><strong>Available Seats:</strong> ${event.availableSeats} / ${event.totalSeats}</p>
                            <div class="event-actions">
                                ${event.availableSeats > 0 ? actionsHtml : '<span style="color:red; font-weight:bold;">Sold Out</span>' + (isAdmin ? `<button onclick="deleteEvent(${event.id})" class="btn" style="background-color: var(--error-color); margin-left:1rem;">Delete</button>` : '')}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('events-loader').innerText = 'Failed to load events.';
            }
        });

        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event?')) return;
            try {
                const res = await fetch(`/api/events/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Event deleted');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const err = await res.text();
                    showToast(err || 'Failed to delete', 'error');
                }
            } catch (e) {
                showToast('Network error', 'error');
            }
        }
    </script>
</body>

</html>
