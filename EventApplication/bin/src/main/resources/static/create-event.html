<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Event Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">EventApp</a></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Create New Event</h2>
            <p id="adminWarning" style="color:var(--error-color); text-align:center; display:none; margin-bottom:1rem;">
                You must be an Admin to create an event.</p>
            <form id="createEventForm">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" name="venue" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" name="price" required>
                </div>
                <div class="form-group">
                    <label>Total Seats</label>
                    <input type="number" name="totalSeats" required>
                </div>
                <!-- Available seats are handled in backend upon creation -->
                <button type="submit" class="btn" style="width: 100%;">Create Event</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check admin status visually (backend will enforce anyway)
            const sessionRes = await fetch('/api/users/profile');
            if (!sessionRes.ok) {
                window.location.href = '/login.html';
                return;
            }
            const user = await sessionRes.json();
            if (user.role !== 'ROLE_ADMIN') {
                document.getElementById('adminWarning').style.display = 'block';
                document.getElementById('createEventForm').querySelector('button').disabled = true;
            }

            handleFormSubmit('createEventForm', '/events', '/events.html');
        });
    </script>
</body>

</html>
